<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - 贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .score {
            font-size: 24px;
            margin-bottom: 15px;
            color: #3498db;
            font-weight: bold;
        }

        #snake-board {
            background: #2c3e50;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            gap: 1px;
            width: 100%;
            max-width: 400px;
            height: 400px;
            margin: 0 auto 20px;
        }

        .snake-cell {
            width: 100%;
            height: 0;
            padding-bottom: 100%;
        }

        .snake {
            background: #2ecc71;
            border-radius: 3px;
        }

        .food {
            background: #e74c3c;
            border-radius: 50%;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 25px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #2980b9;
        }

        .tips {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        @media (max-width: 400px) {
            #snake-board {
                height: 300px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>经典贪吃蛇</h1>
        <div class="score">得分: <span id="snake-score">0</span></div>
        <div id="snake-board"></div>
        <div class="controls">
            <button class="btn" onclick="resetSnake()">重新开始</button>
        </div>
        <div class="tips">操作说明：方向键 ↑↓←→ 控制蛇的移动</div>
    </div>

    <script>
        let snakeBoard = document.getElementById('snake-board');
        let snakeScore = document.getElementById('snake-score');
        let snake;
        let food;
        let direction;
        let snakeInterval;
        let score = 0;

        // 初始化贪吃蛇
        function initSnake() {
            snakeBoard.innerHTML = '';
            snake = [{ x: 10, y: 10 }];
            food = generateFood();
            direction = 'right';
            score = 0;
            snakeScore.textContent = score;
            drawSnake();
            drawFood();
        }

        // 生成食物
        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * 20),
                    y: Math.floor(Math.random() * 20)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            return newFood;
        }

        // 绘制贪吃蛇
        function drawSnake() {
            snake.forEach(segment => {
                const snakeElement = document.createElement('div');
                snakeElement.style.gridRowStart = segment.y + 1;
                snakeElement.style.gridColumnStart = segment.x + 1;
                snakeElement.classList.add('snake-cell', 'snake');
                snakeBoard.appendChild(snakeElement);
            });
        }

        // 绘制食物
        function drawFood() {
            const foodElement = document.createElement('div');
            foodElement.style.gridRowStart = food.y + 1;
            foodElement.style.gridColumnStart = food.x + 1;
            foodElement.classList.add('snake-cell', 'food');
            snakeBoard.appendChild(foodElement);
        }

        // 移动贪吃蛇
        function moveSnake() {
            const head = { ...snake[0] };
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            snake.unshift(head);
            
            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                snakeScore.textContent = score;
                food = generateFood();
            } else {
                snake.pop();
            }
            
            // 碰撞检测
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || 
                snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)) {
                clearInterval(snakeInterval);
                alert(`游戏结束！得分: ${score}`);
                return;
            }
            
            snakeBoard.innerHTML = '';
            drawSnake();
            drawFood();
        }

        // 控制方向
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && direction !== 'down') direction = 'up';
            if (e.key === 'ArrowDown' && direction !== 'up') direction = 'down';
            if (e.key === 'ArrowLeft' && direction !== 'right') direction = 'left';
            if (e.key === 'ArrowRight' && direction !== 'left') direction = 'right';
        });

        // 重置贪吃蛇
        function resetSnake() {
            clearInterval(snakeInterval);
            initSnake();
            snakeInterval = setInterval(moveSnake, 150);
        }

        // 页面加载初始化
        window.onload = resetSnake;
    </script>
</body>
</html>
